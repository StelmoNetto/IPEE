name: Renumber README Nº column

on:
  push:
    paths:
      - '1º assunto/README.md'
      - '2º assunto/README.md'
      - '3º assunto/README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renumber:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Renumber Nº column
        shell: bash
        run: |
          python .github/scripts/renumber_readme_table.py \
            '1º assunto/README.md' \
            '2º assunto/README.md' \
            '3º assunto/README.md'

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- '1º assunto/README.md' '2º assunto/README.md' '3º assunto/README.md'; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add '1º assunto/README.md' '2º assunto/README.md' '3º assunto/README.md'
          git commit -m "chore: renumber README Nº column"
          git push