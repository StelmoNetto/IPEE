name: Renumber README Nº column

on:
  push:
    paths:
      - '1º assunto/README.md'
      - '2º assunto/README.md'
      - '3º assunto/README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renumber:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get changed README files
        id: changed
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"

          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            files=$(git diff --name-only "$before_sha" "${{ github.sha }}" -- \
              '1º assunto/README.md' \
              '2º assunto/README.md' \
              '3º assunto/README.md' | tr '\n' ' ')
          else
            files=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" -- \
              '1º assunto/README.md' \
              '2º assunto/README.md' \
              '3º assunto/README.md' | tr '\n' ' ')
          fi

          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Renumber Nº column
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          python .github/scripts/renumber_readme_table.py ${{ steps.changed.outputs.files }}

      - name: Commit and push changes
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          if git diff --quiet -- '1º assunto/README.md' '2º assunto/README.md' '3º assunto/README.md'; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add '1º assunto/README.md' '2º assunto/README.md' '3º assunto/README.md'
          git commit -m "chore: renumber README Nº column"
          git push